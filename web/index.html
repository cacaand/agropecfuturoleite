<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GadoLeite ERP — Gestão Pecuária Enterprise">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GadoLeite ERP">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1A6B34">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GadoLeite ERP</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    body { margin: 0; background: #0B1A12; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .loader { text-align: center; }
    .loader h1 { color: #2AA653; font-family: sans-serif; font-size: 24px; margin: 16px 0 4px; }
    .loader p { color: #ffffff55; font-family: sans-serif; font-size: 13px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1A3020; border-top-color: #2AA653; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <h1>🐄 GadoLeite ERP</h1>
    <p>Carregando sistema...</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loader').remove();
    });
  </script>
</body>
</html>
