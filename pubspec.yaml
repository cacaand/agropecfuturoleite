name: gadoleite
description: ERP Gado Leiteiro — Gestão Pecuária Enterprise
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  pdf: ^3.11.0
  printing: ^5.13.1
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  pin_code_fields: ^8.0.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  msix: ^3.16.7

flutter:
  uses-material-design: true

msix_config:
  display_name: GadoLeite ERP
  publisher_display_name: IAmina
  identity_name: com.iamina.gadoleite
  msix_version: 1.0.0.0
  logo_path: assets/icons/icon.png
  capabilities: internetClient,microphone
